[pytest]
testpaths = tests
# Exclude @pytest.mark.slow (currently: multivariate sparse_interp roadmap stress test).
# Run it explicitly: pytest -m slow tests/test_sparse_interp.py --timeout=0 -v
# Or temporarily: pytest -m slow --override-ini="addopts=-v" tests/
addopts = -v -m "not slow"
pythonpath = python
markers =
    slow: expensive roadmap / stress tests (not collected by default; Linux tier1b / nightly sparse job)
