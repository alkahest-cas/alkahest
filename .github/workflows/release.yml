name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-wheels:
    name: wheel ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    env:
      # PyO3 0.21 supports up to 3.12; this allows 3.13 via the stable ABI.
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install flint

      - name: Install maturin
        if: runner.os != 'Linux'
        run: pip install maturin

      - name: Build wheel (Linux manylinux)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --strip --out dist
          manylinux: "2_28"
          before-script-linux: |
            yum install -y epel-release || dnf install -y epel-release || true
            if ! yum install -y flint-devel 2>/dev/null && ! dnf install -y flint-devel 2>/dev/null; then
              yum install -y gmp-devel mpfr-devel curl make gcc gcc-c++
              curl -LO https://github.com/flintlib/flint/releases/download/v2.9.0/flint-2.9.0.tar.gz
              tar xf flint-2.9.0.tar.gz
              ( cd flint-2.9.0 && ./configure && make -j"$(nproc)" && make install )
              ldconfig
            fi

      - name: Build wheel (macOS universal2)
        if: runner.os == 'macOS'
        run: maturin build --release --strip --target universal2-apple-darwin --out dist

      - name: Build wheel (Windows)
        if: runner.os == 'Windows'
        run: maturin build --release --strip --out dist

      - name: Smoke test
        run: |
          pip install --find-links dist alkahest
          python -c "import alkahest; p = alkahest.ExprPool(); x = p.symbol('x'); print(alkahest.simplify(x + 0))"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl

  publish-testpypi:
    name: publish to TestPyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/

  publish:
    name: publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
