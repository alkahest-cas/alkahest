name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-wheels:
    name: wheel ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-14 = arm64 (Apple Silicon), macos-13 = x86_64 (Intel) — built
        # natively on each to avoid cross-compiling gmp-mpfr-sys assembly.
        os: [ubuntu-22.04, macos-14, macos-13, windows-2022]
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    env:
      # PyO3 0.21 supports up to 3.12; this allows 3.13 via the stable ABI.
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install flint

      - name: Set up MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-flint

      - name: Add GNU target and configure linker (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          rustup target add x86_64-pc-windows-gnu
          mkdir -p "$CARGO_HOME"
          printf '[target.x86_64-pc-windows-gnu]\nlinker = "C:/msys64/mingw64/bin/gcc.exe"\nar = "C:/msys64/mingw64/bin/ar.exe"\n' \
            >> "$CARGO_HOME/config.toml"

      - name: Install maturin
        if: runner.os != 'Linux'
        run: pip install maturin

      - name: Build wheel (Linux manylinux)
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        env:
          # maturin-action passes all runner env vars into the manylinux Docker
          # container via -e flags, so these reach cargo unconditionally.
          # Covers both the dnf-installed path (/usr/lib64) and the source-built
          # path (/usr/local/lib) without relying on before-script exports.
          RUSTFLAGS: "-L/usr/local/lib -L/usr/lib -L/usr/lib64"
          PKG_CONFIG_PATH: "/usr/local/lib/pkgconfig:/usr/lib64/pkgconfig"
        with:
          command: build
          args: --release --strip --out dist
          manylinux: "2_28"
          before-script-linux: |
            dnf install -y epel-release || true
            dnf config-manager --set-enabled powertools 2>/dev/null || true
            if ! dnf install -y flint-devel 2>/dev/null; then
              dnf install -y gmp-devel mpfr-devel make gcc
              curl -fsSL \
                https://github.com/flintlib/flint/archive/refs/tags/v2.9.0.tar.gz \
                | tar xz -C /tmp
              ( cd /tmp/flint-2.9.0 && ./configure --prefix=/usr/local && make -j"$(nproc)" && make install )
              ldconfig /usr/local/lib
            fi

      - name: Build wheel (macOS)
        if: runner.os == 'macOS'
        run: maturin build --release --strip --out dist

      - name: Build wheel (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          PKG_CONFIG_PATH: "C:/msys64/mingw64/lib/pkgconfig"
          CC: "C:/msys64/mingw64/bin/gcc.exe"
          CXX: "C:/msys64/mingw64/bin/g++.exe"
        run: |
          export PATH="C:/msys64/mingw64/bin:$PATH"
          maturin build --release --strip --target x86_64-pc-windows-gnu --out dist

      - name: Smoke test
        run: |
          pip install --find-links dist alkahest
          python -c "import alkahest; p = alkahest.ExprPool(); x = p.symbol('x'); print(alkahest.simplify(x + 0))"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl

  publish-testpypi:
    name: publish to TestPyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/

  publish:
    name: publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
