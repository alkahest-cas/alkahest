name: docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'python/alkahest/**'
      - 'alkahest-core/src/**'
      - 'alkahest-py/src/**'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'python/alkahest/**'
      - 'alkahest-core/src/**'
      - 'alkahest-py/src/**'

permissions:
  contents: read
  pages: write
  id-token: write

# One run at a time per ref (newer push to the same ref cancels the older one).
# Scoped by ref so a PR's doc build is not cancelled by another ref's run
# (e.g. main's deploy) — the old static `pages` group cancelled across all refs.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mdBook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook

      - name: Build mdBook (user guide)
        run: mdbook build docs/mdbook

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build Sphinx (Python API)
        run: |
          pip install sphinx furo
          sphinx-build -W --keep-going docs/sphinx _site/api

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (rustdoc)
        run: sudo apt-get install -y libflint-dev llvm-15-dev

      - name: Build rustdoc (Rust API)
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Assemble site
        run: |
          cp -r docs/mdbook/book/. _site/
          cp -r target/doc _site/rustdoc

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
