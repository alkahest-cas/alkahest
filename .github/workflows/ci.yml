name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily — triggers the nightly job

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Tier 1a: PR checks (Rust + fast Python; stays well under the 6 h runner cap)
  tier1:
    name: Tier 1a — Rust + fast Python
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      # Built in docs.yml for Pages; committing it bloats the repo and drifts from sources.
      - name: No committed _site/ (generated docs bundle)
        run: |
          tracked=$(git ls-files _site || true)
          if [ -n "$tracked" ]; then
            echo "::error title=Committed generated site::_site/ must not be tracked. Remove with: git rm -r --cached _site && ensure _site/ is in .gitignore"
            echo "$tracked"
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get install -y libflint-dev llvm-15-dev llvm-15

      - name: Create venv and install Python tooling
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest pytest-timeout ruff hypothesis
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo clippy (egraph feature)
        run: cargo clippy --all-targets --features egraph -- -D warnings

      - name: cargo clippy (parallel feature)
        run: cargo clippy --all-targets --features parallel -- -D warnings

      - name: cargo clippy (jit feature)
        run: cargo clippy --all-targets --features jit -- -D warnings

      - name: cargo test
        run: cargo test --all

      - name: ruff check
        run: ruff check python/ tests/

      - name: maturin develop
        run: maturin develop --manifest-path alkahest-py/Cargo.toml --features groebner

      - name: pytest (exclude slow sparse-interp roadmap)
        env:
          PYTHONUNBUFFERED: "1"
        run: pytest -m "not slow" --timeout=900

      - name: Install Rust nightly (for ASan)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu
          components: rust-src

      # Scope to alkahest-core: full-workspace + sanitizer + build-std often exceeds
      # runner wall-clock with little log output (looks "stuck"). MLIR/Python ASan
      # stays uninstrumented here; TSAN/LSan still cover the workspace on schedule.
      - name: cargo test (AddressSanitizer, alkahest-core only)
        # --lib --tests: skip doc tests — doc-test binaries link separately and
        # don't receive the ASan runtime when built via -Z build-std, causing
        # "undefined symbol: __asan_init" linker errors.  Unit + integration
        # tests are the meaningful targets for buffer-overflow detection anyway.
        # LSAN_OPTIONS=detect_leaks=0: suppress GMP/rug thread-cache false positives.
        env:
          LSAN_OPTIONS: detect_leaks=0
        run: |
          echo "::group::ASan build + test (alkahest-core)"
          RUSTFLAGS="-Zsanitizer=address" \
          cargo +nightly test -p alkahest-core --lib --tests \
            --target x86_64-unknown-linux-gnu \
            -Z build-std
          echo "::endgroup::"

  # ── Tier 1b: slow Python integration (roadmap-level sparse_interp)
  # Runs on the nightly schedule only so push/PR CI stays fast; run locally with:
  #   pytest tests/test_sparse_interp.py -m slow --timeout=0 -v
  tier1-python-slow:
    name: Tier 1b — Python slow tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get install -y libflint-dev llvm-15-dev llvm-15

      - name: Create venv and install Python tooling
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest pytest-timeout
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: maturin develop
        run: maturin develop --manifest-path alkahest-py/Cargo.toml --features groebner

      # Scan only sparse_interp tests — full `pytest -m slow` imports every module under
      # `tests/` during collection (needs hypothesis, sympy, …).
      - name: pytest (slow only)
        env:
          PYTHONUNBUFFERED: "1"
        run: pytest tests/test_sparse_interp.py -m slow --timeout=0 -v

  # ── Tier 2: Nightly integration (cron on main) ─────────────────────────────
  # Split into parallel shards so each GitHub-hosted job stays under the 6 h cap.
  nightly:
    name: Nightly (${{ matrix.shard }})
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        shard:
          - proptest
          - hypothesis
          - tsan
          - lsan
          - valgrind
          - fuzz-expr
          - fuzz-simplifier
          - extras

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        if: >-
          matrix.shard == 'proptest' || matrix.shard == 'hypothesis' ||
          matrix.shard == 'fuzz-expr' || matrix.shard == 'fuzz-simplifier' ||
          matrix.shard == 'extras'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust nightly
        if: >-
          matrix.shard == 'tsan' || matrix.shard == 'lsan' ||
          matrix.shard == 'valgrind'
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu
          components: rust-src

      - uses: actions/setup-python@v5
        if: matrix.shard == 'hypothesis' || matrix.shard == 'extras'
        with:
          python-version: "3.11"

      - name: Create venv (hypothesis / extras)
        if: matrix.shard == 'hypothesis' || matrix.shard == 'extras'
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest hypothesis sympy ruff mpmath symengine wolframclient
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV

      - name: Install system dependencies
        run: sudo apt-get install -y libflint-dev llvm-15-dev llvm-15

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-nightly-${{ matrix.shard }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Deep proptest
        if: matrix.shard == 'proptest'
        env:
          PROPTEST_CASES: "50000"
        run: cargo test --all --release

      - name: Deep hypothesis
        if: matrix.shard == 'hypothesis'
        env:
          HYPOTHESIS_MAX_EXAMPLES: "5000"
        run: |
          maturin develop --manifest-path alkahest-py/Cargo.toml --features groebner
          pytest tests/

      - name: ThreadSanitizer
        if: matrix.shard == 'tsan'
        run: |
          RUSTFLAGS="-Zsanitizer=thread" \
          cargo +nightly test --workspace --lib --tests \
            --target x86_64-unknown-linux-gnu \
            -Z build-std

      - name: LeakSanitizer
        if: matrix.shard == 'lsan'
        env:
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/lsan.supp
          LLVM_SYMBOLIZER_PATH: /usr/bin/llvm-symbolizer-15
        run: |
          RUSTFLAGS="-Zsanitizer=leak" \
          cargo +nightly test --workspace --lib --tests \
            --target x86_64-unknown-linux-gnu \
            -Z build-std

      - name: Install Valgrind
        if: matrix.shard == 'valgrind'
        run: sudo apt-get install -y valgrind

      - name: Valgrind — Rust/C FFI boundary
        if: matrix.shard == 'valgrind'
        env:
          RUSTFLAGS: "-C debuginfo=2 -Z dwarf-version=4"
        run: |
          cargo +nightly build --all --target x86_64-unknown-linux-gnu -Z build-std
          for bin in target/x86_64-unknown-linux-gnu/debug/deps/alkahest_core-*; do
            [ -x "$bin" ] || continue
            valgrind --leak-check=full --error-exitcode=1 \
              --suppressions=valgrind.supp "$bin" 2>&1
          done

      - name: Install cargo-afl
        if: matrix.shard == 'fuzz-expr' || matrix.shard == 'fuzz-simplifier'
        run: cargo install cargo-afl

      - name: AFL++ fuzzing — expr builder (2 h cap)
        if: matrix.shard == 'fuzz-expr'
        run: |
          if [ -f fuzz/src/bin/fuzz_expr_builder.rs ]; then
            cargo afl build --manifest-path fuzz/Cargo.toml --bin fuzz_expr_builder
            timeout 7200 cargo afl fuzz \
              -i fuzz/in/expr_builder -o fuzz/out/expr_builder \
              target/debug/fuzz_expr_builder || true
          fi

      - name: AFL++ fuzzing — simplifier (2 h cap)
        if: matrix.shard == 'fuzz-simplifier'
        run: |
          if [ -f fuzz/src/bin/fuzz_simplifier.rs ]; then
            cargo afl build --manifest-path fuzz/Cargo.toml --bin fuzz_simplifier
            timeout 7200 cargo afl fuzz \
              -i fuzz/in/simplifier -o fuzz/out/simplifier \
              target/debug/fuzz_simplifier || true
          fi

      - name: Oracle + benches + cross-CAS + artifact upload
        if: matrix.shard == 'extras'
        env:
          RUN_COMMERCIAL_CAS: "1"
        run: |
          maturin develop --manifest-path alkahest-py/Cargo.toml --features groebner
          if [ -f tests/test_oracle.py ]; then
            pytest tests/test_oracle.py -v
          fi
          cargo bench --all 2>&1 | tee bench.log || true
          python benchmarks/criterion_to_report.py --output criterion_report.html || true
          python benchmarks/cas_comparison.py --competitors --output results.jsonl || true

      - name: Upload benchmark artifacts
        if: always() && matrix.shard == 'extras'
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-${{ github.run_id }}
          path: |
            results.jsonl
            criterion_report.html
            criterion_summary.json
          if-no-files-found: ignore
