name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily — triggers the nightly job

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Tier 1: PR checks (< 10 min, every commit) ──────────────────────────────
  tier1:
    name: Tier 1 — PR Checks
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get install -y libflint-dev llvm-15-dev

      - name: Create venv and install Python tooling
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest ruff hypothesis
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo clippy (egraph feature)
        run: cargo clippy --all-targets --features egraph -- -D warnings

      - name: cargo clippy (parallel feature)
        run: cargo clippy --all-targets --features parallel -- -D warnings

      - name: cargo clippy (jit feature)
        run: cargo clippy --all-targets --features jit -- -D warnings

      - name: cargo test
        run: cargo test --all

      - name: ruff check
        run: ruff check python/ tests/

      - name: maturin develop
        run: maturin develop --manifest-path alkahest-py/Cargo.toml --features groebner

      - name: pytest
        run: pytest

      - name: Install Rust nightly (for ASan)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu
          components: rust-src

      - name: cargo test (AddressSanitizer)
        # --lib --tests: skip doc tests — doc-test binaries link separately and
        # don't receive the ASan runtime when built via -Z build-std, causing
        # "undefined symbol: __asan_init" linker errors.  Unit + integration
        # tests are the meaningful targets for buffer-overflow detection anyway.
        # LSAN_OPTIONS=detect_leaks=0: suppress GMP/rug thread-cache false positives.
        env:
          LSAN_OPTIONS: detect_leaks=0
        run: |
          RUSTFLAGS="-Zsanitizer=address" \
          cargo +nightly test --workspace --lib --tests \
            --target x86_64-unknown-linux-gnu \
            -Z build-std

  # ── Tier 2: Nightly integration (4–8 h, cron on main) ─────────────────────
  nightly:
    name: Tier 2 — Nightly Integration
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu
          components: rust-src

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get install -y libflint-dev llvm-15-dev

      - name: Create venv and install Python tooling
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest hypothesis sympy ruff mpmath symengine wolframclient
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('**/Cargo.lock') }}

      - name: Deep proptest (100 000 iterations)
        env:
          PROPTEST_CASES: "100000"
        run: cargo test --all --release

      - name: Deep hypothesis (10 000 examples)
        env:
          HYPOTHESIS_MAX_EXAMPLES: "10000"
        run: |
          maturin develop --manifest-path alkahest-py/Cargo.toml --features groebner
          pytest tests/

      - name: ThreadSanitizer
        run: |
          RUSTFLAGS="-Zsanitizer=thread" \
          cargo +nightly test --workspace --lib --tests \
            --target x86_64-unknown-linux-gnu \
            -Z build-std

      - name: LeakSanitizer
        env:
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/lsan.supp
        run: |
          RUSTFLAGS="-Zsanitizer=leak" \
          cargo +nightly test --workspace --lib --tests \
            --target x86_64-unknown-linux-gnu \
            -Z build-std

      - name: Install Valgrind
        run: sudo apt-get install -y valgrind

      - name: Valgrind — Rust/C FFI boundary
        # Force DWARF4: Valgrind 3.18.x does not support DWARF5 (DW_FORM_implicit_const)
        # emitted by recent nightly Rust when built with -Z build-std.
        # valgrind.supp suppresses GMP/MPFR/FLINT internal caches (same false
        # positives suppressed in the LSan step via lsan.supp).
        env:
          RUSTFLAGS: "-C debuginfo=2 -Z dwarf-version=4"
        run: |
          cargo +nightly build --all --target x86_64-unknown-linux-gnu -Z build-std
          for bin in target/x86_64-unknown-linux-gnu/debug/deps/alkahest_core-*; do
            [ -x "$bin" ] || continue
            valgrind --leak-check=full --error-exitcode=1 \
              --suppressions=valgrind.supp "$bin" 2>&1
          done

      - name: Install cargo-afl
        run: cargo install cargo-afl

      - name: AFL++ fuzzing — expr builder (2 h)
        run: |
          if [ -f fuzz/src/bin/fuzz_expr_builder.rs ]; then
            cargo afl build --manifest-path fuzz/Cargo.toml --bin fuzz_expr_builder
            timeout 7200 cargo afl fuzz \
              -i fuzz/in/expr_builder -o fuzz/out/expr_builder \
              target/debug/fuzz_expr_builder || true
          fi

      - name: AFL++ fuzzing — simplifier (2 h)
        run: |
          if [ -f fuzz/src/bin/fuzz_simplifier.rs ]; then
            cargo afl build --manifest-path fuzz/Cargo.toml --bin fuzz_simplifier
            timeout 7200 cargo afl fuzz \
              -i fuzz/in/simplifier -o fuzz/out/simplifier \
              target/debug/fuzz_simplifier || true
          fi

      - name: SymPy oracle
        run: |
          if [ -f tests/test_oracle.py ]; then
            pytest tests/test_oracle.py -v
          fi

      # ── Benchmark artifact upload (RW-6) ──────────────────────────────────
      - name: Criterion benchmarks
        run: cargo bench --all 2>&1 | tee bench.log || true

      - name: Criterion dashboard
        run: python benchmarks/criterion_to_report.py --output criterion_report.html || true

      - name: Cross-CAS benchmark (V1-13)
        # Mathematica rows appear only when WolframEngine is activated on the runner.
        # See install-wolfram.sh for one-time activation instructions.
        # SymEngine rows always appear (pip-installed above).
        env:
          RUN_COMMERCIAL_CAS: "1"
        run: |
          maturin develop --manifest-path alkahest-py/Cargo.toml --features groebner
          python benchmarks/cas_comparison.py --competitors --output results.jsonl || true

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-${{ github.run_id }}
          path: |
            results.jsonl
            criterion_report.html
            criterion_summary.json
          if-no-files-found: ignore
