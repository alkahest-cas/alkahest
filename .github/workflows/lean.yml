# V5-8: Lean 4 certificate verification CI
# Installs Lean 4 + Mathlib and verifies generated .lean proofs.
name: Lean 4 Proofs

on:
  push:
    branches: [main]
    paths:
      - 'alkahest-core/src/lean/**'
      - 'tests/lean_corpus.py'
      - '.github/workflows/lean.yml'
  pull_request:
    branches: [main]
    paths:
      - 'alkahest-core/src/lean/**'
      - 'tests/lean_corpus.py'
      - 'lean/**'

jobs:
  lean-verify:
    name: Verify Lean 4 proofs
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Lean 4 via elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- --default-toolchain leanprover/lean4:v4.9.0 -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lean toolchain and Mathlib oleans
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            lean/.lake
          key: lean-${{ runner.os }}-${{ hashFiles('lean/lean-toolchain', 'lean/lakefile.lean') }}-v1
          restore-keys: |
            lean-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install FLINT (native extension link)
        run: sudo apt-get update && sudo apt-get install -y libflint-dev

      - name: Install maturin and build alkahest
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          .venv/bin/maturin develop -m alkahest-py/Cargo.toml --features groebner

      - name: Generate Lean proofs
        run: |
          python tests/lean_corpus.py --output /tmp/lean_proofs/

      - name: Set up Mathlib (lake update + cache get)
        run: |
          cd lean
          lake update
          lake exe cache get

      - name: Verify proofs with Lean
        run: |
          cd lean
          for f in /tmp/lean_proofs/*.lean; do
            fname=$(basename "$f")
            echo "Verifying $fname..."
            lake env lean "$f" || { echo "FAILED: $fname"; exit 1; }
          done
          echo "All Lean proofs verified."
