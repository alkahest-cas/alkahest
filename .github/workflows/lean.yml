# V5-8: Lean 4 certificate verification CI
# Installs Lean 4 + Mathlib and verifies generated .lean proofs.
name: Lean 4 Proofs

on:
  push:
    branches: [main]
    paths:
      - 'alkahest-core/src/lean/**'
      - 'alkahest-core/src/deriv/**'
      - 'alkahest-core/src/diff/**'
      - 'alkahest-core/src/simplify/**'
      - 'alkahest-core/src/kernel/**'
      - 'alkahest-py/src/lib.rs'
      - 'tests/lean_corpus.py'
      - 'tests/test_smoke.py'
      - 'lean/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'alkahest-py/Cargo.toml'
      - '.github/workflows/lean.yml'
  pull_request:
    branches: [main]
    paths:
      - 'alkahest-core/src/lean/**'
      - 'alkahest-core/src/deriv/**'
      - 'alkahest-core/src/diff/**'
      - 'alkahest-core/src/simplify/**'
      - 'alkahest-core/src/kernel/**'
      - 'alkahest-py/src/lib.rs'
      - 'tests/lean_corpus.py'
      - 'tests/test_smoke.py'
      - 'lean/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'alkahest-py/Cargo.toml'
      - '.github/workflows/lean.yml'

jobs:
  lean-verify:
    name: Verify Lean 4 proofs
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Install Lean 4 via elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- --default-toolchain leanprover/lean4:v4.9.0 -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lean toolchain and Mathlib oleans
        uses: actions/cache@v5
        with:
          path: |
            ~/.elan
            lean/.lake
          key: lean-${{ runner.os }}-${{ hashFiles('lean/lean-toolchain', 'lean/lakefile.lean', 'lean/lake-manifest.json') }}-v2
          restore-keys: |
            lean-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install FLINT (native extension link)
        run: sudo apt-get update && sudo apt-get install -y libflint-dev

      - name: Install maturin and build alkahest
        run: |
          python -m venv .venv
          # maturin ≥1.13 uses `pip install --group` (PEP 735) which requires pip ≥25.
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install maturin
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          .venv/bin/maturin develop -m alkahest-py/Cargo.toml --features groebner

      - name: Generate Lean proofs
        run: |
          python tests/lean_corpus.py --output /tmp/lean_proofs/

      - name: Set up Mathlib (lake update + cache get)
        run: |
          cd lean
          lake update
          lake exe cache get

      - name: Verify proofs with Lean without admissions
        run: |
          cd lean
          for f in /tmp/lean_proofs/*.lean; do
            fname=$(basename "$f")
            echo "Verifying $fname..."
            if grep -Eq '\b(sorry|admit|axiom)\b' "$f"; then
              echo "FAILED: $fname contains an admission"
              exit 1
            fi
            lake env lean -DwarningAsError=true "$f" || { echo "FAILED: $fname"; exit 1; }
          done
          echo "All generated Lean proofs verified without admissions."

      - name: Upload generated Lean proofs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: generated-lean-proofs
          path: /tmp/lean_proofs
          if-no-files-found: ignore
