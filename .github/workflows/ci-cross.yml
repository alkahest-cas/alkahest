name: ci-cross

# V1-10: Windows + macOS CI parity.
#
# macOS-14 (Apple Silicon): full feature set (parallel, egraph, jit) + Python tests.
# windows-2022 (GNU toolchain via MSYS2): parallel + egraph.
#   jit excluded on Windows: inkwell pins LLVM 15; MSYS2 currently ships LLVM 17+.
#   Revisit when inkwell adds an LLVM 17 feature flag.
#
# Windows cargo steps use `shell: msys2 {0}` so that gmp-mpfr-sys (which
# always builds GMP from source on Windows) has access to sh, m4, make, and
# the rest of the POSIX build toolchain without PATH translation issues.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  cross:
    name: cross / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rust_toolchain: stable
            features: "parallel egraph jit"
            python: true
          - os: windows-2022
            # GNU toolchain required: gmp-mpfr-sys (used by rug) does not
            # support the MSVC target.
            rust_toolchain: stable-x86_64-pc-windows-gnu
            features: "parallel egraph"
            python: false

    steps:
      - uses: actions/checkout@v4

      # ── Rust toolchain ───────────────────────────────────────────────────────
      - name: Install Rust (${{ matrix.rust_toolchain }})
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust_toolchain }}

      # ── Platform dependencies ────────────────────────────────────────────────
      - name: Install FLINT (macOS)
        if: runner.os == 'macOS'
        run: brew install flint

      - name: Install LLVM 15 (macOS, for jit feature)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@15
          echo "LLVM_SYS_150_PREFIX=$(brew --prefix llvm@15)" >> $GITHUB_ENV
          echo "DYLD_LIBRARY_PATH=$(brew --prefix llvm@15)/lib${DYLD_LIBRARY_PATH:+:$DYLD_LIBRARY_PATH}" >> $GITHUB_ENV

      - name: Set up MSYS2 + FLINT (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          # flint pulls in gmp, mpfr, mpc as dependencies.
          # m4 + make are required by gmp-mpfr-sys, which always builds GMP
          # from bundled source on Windows.
          install: >-
            mingw-w64-x86_64-flint
            m4
            make

      # ── Cargo cache ──────────────────────────────────────────────────────────
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cross-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-cross-

      # ── Rust build + test (macOS) ────────────────────────────────────────────
      - name: cargo build (no-default-features baseline)
        if: runner.os == 'macOS'
        run: cargo build -p alkahest-core --no-default-features

      - name: cargo build (${{ matrix.features }})
        if: runner.os == 'macOS'
        run: cargo build -p alkahest-core --features "${{ matrix.features }}"

      - name: cargo test (${{ matrix.features }})
        if: runner.os == 'macOS'
        run: cargo test -p alkahest-core --features "${{ matrix.features }}"

      # ── Rust build + test (Windows, inside MSYS2 shell) ─────────────────────
      # Running inside msys2 {0} gives gmp-mpfr-sys access to sh, m4, make
      # without Windows PATH translation issues.
      - name: cargo build (no-default-features baseline) [Windows]
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cargo build -p alkahest-core --no-default-features

      - name: cargo build (${{ matrix.features }}) [Windows]
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cargo build -p alkahest-core --features "${{ matrix.features }}"

      - name: cargo test (${{ matrix.features }}) [Windows]
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cargo test -p alkahest-core --features "${{ matrix.features }}"

      # ── Python tests (macOS only) ────────────────────────────────────────────
      - name: Install Python
        if: matrix.python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python tooling
        if: matrix.python
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest hypothesis ruff

      - name: maturin develop
        if: matrix.python
        run: .venv/bin/maturin develop --manifest-path alkahest-py/Cargo.toml

      - name: pytest
        if: matrix.python
        run: .venv/bin/pytest tests/ -x -q
